<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Events</title>
    <style>
        body{
            height: 300vh;
        }
        #myDiv {
            width: 300px;
            height: 300px;
            background-color: aquamarine;
        }
    </style>
</head>

<body>
    <h1>Mouse Events</h1>
    <br>
    <div id="myDiv"></div>
    <br>
    <input type="text">
    <br><br>
    <form action="#">
        <label for="name">Enter your Name: </label>
        <input id="myInput" type="text" name="fname" id="name">
        <br><br>
        <button>Submit</button>
    </form>


    <script>
        let box = document.getElementById("myDiv");
        box.addEventListener("click", () => {
            box.style.backgroundColor = "red";
            box.innerText = "singleclick";
            box.style.textAlign = "center";
            box.style.fontSize = "30px"
            box.style.color = "white"
            box.style.display = "flex"
            box.style.alignItems = "center"
            box.style.justifyContent = "center"
        });
        box.addEventListener("dblclick", () => {
            box.style.backgroundColor = "green";
            box.innerText = "doubleclick";
        });
        box.addEventListener("mouseover", () => {
            box.style.backgroundColor = "blue";
            box.innerText = "MouseOver";
            box.style.textAlign = "center";
            box.style.fontSize = "30px"
            box.style.color = "white"
            box.style.display = "flex"
            box.style.alignItems = "center"
            box.style.justifyContent = "center"
        });
        box.addEventListener("mouseout", mouseOut);
        function mouseOut() {
            box.style.backgroundColor = "orange";
            box.innerText = "mouseout";
            box.style.textAlign = "center";
            box.style.fontSize = "30px"
            box.style.color = "white"
            box.style.display = "flex"
            box.style.alignItems = "center"
            box.style.justifyContent = "center"
        };
        
        box.addEventListener("mousemove", (e) => {
            box.innerText = `X-Value ${e.offsetX} and Y-Value ${e.offsetY}`;
        })
        let i = document.querySelector("input");
        i.addEventListener("keydown", (e)=>{
            console.log(`Key Presses is ${e.key}`)
        })
         i.addEventListener("keyup", (e)=>{
            console.log(`Key released is ${e.key}`)
        })
        i.addEventListener("keypress",(e)=>{
            const pattern = /^[A-Za-z]$/;

            if(!pattern.test(e.key)){
                e.preventDefault(); //prevents the page refresh , page does not refresh
            }
        })
 
        let form = document.querySelector("form");

        form.addEventListener("submit",(event)=>{
            event.preventDefault();
            alert("form submitted successfully!")
        })
        document.querySelector('#myInput').addEventListener("focus",()=>{
            console.log("focused")
        })
        document.querySelector('#myInput').addEventListener("blur",()=>{
            console.log(" not focused")
        })


        //how do u read the value which is preseny inside input box===>event.target.value(go where the event occured and target the value)
        document.querySelector('#myInput').addEventListener("change",(e)=>{
            console.log(`Value is ${e.target.value}`)
        })

        //inorder to read each and avery input use input method IT CAN READ NUMBERS SPACE AND ALPHABETS ONLY 
        document.querySelector('#myInput').addEventListener("input", (e)=> {
            console.log(`The input is ${e.target.value}`);
        })
        

        window.addEventListener("DOMContentLoaded",()=>{
            console.log("dom loaded");
        })

        window.addEventListener("resize",()=>{
            console.log("window has been resized")
        })

         document.addEventListener("scroll",()=>{
            console.log("window has been scrolled", window.scrollY, window.scrollX)
        })


    </script>
</body>

</html>
